<section data-kw-info-module="contact">
  <article data-kw-info-item data-kw-info-title="CONTACT US">
    <h3>Before You Submit</h3>
    <p>For warranty, repair, maintenance, troubleshooting, or order support, include your order number and attach or link clear photos or video when possible. More detail makes it easier to route your request correctly.</p>

    <form class="kw-info-contact-form" action="https://formspree.io/f/mvgogzbk" method="POST">
      <h2>Contact Us</h2>
      <div class="kw-info-contact-columns">
        <div class="kw-info-contact-left">
          <label for="kw-info-name">Name (required)</label>
          <input type="text" name="name" id="kw-info-name" required>

          <label for="kw-info-email">Email (required)</label>
          <input type="email" name="email" id="kw-info-email" required>

          <label for="kw-info-phone">Phone (optional)</label>
          <input type="tel" name="phone" id="kw-info-phone">

          <label for="kw-info-contact-type">Type of Inquiry (required)</label>
          <select name="contact-type" id="kw-info-contact-type" required>
            <option value="General Inquiry">General Inquiry</option>
            <option value="Partnerships">Partnerships</option>
            <option value="An Order I Placed">An Order I Placed</option>
            <option value="Sizing Questions">Sizing Questions</option>
            <option value="Witches In The Wild">Witches In The Wild</option>
            <option value="The Coven Membership">The Coven Membership</option>
            <option value="Product Support / Troubleshooting">Product Support / Troubleshooting</option>
            <option value="Warranty, Repair, or Maintenance Request">Warranty, Repair, or Maintenance Request</option>
            <option value="Witches In Ukraine Program">Witches In Ukraine Program</option>
            <option value="Witches At War Program">Witches At War Program</option>
            <option value="Luminous Design Inquiry">Luminous Design Inquiry</option>
            <option value="Custom Design Inquiry">Custom Design Inquiry</option>
            <option value="Other">Other</option>
          </select>

          <label for="kw-info-subject">Subject</label>
          <input type="text" name="subject" id="kw-info-subject" required>

          <label for="kw-info-order-number">Order Number (if applicable)</label>
          <input type="text" name="order-number" id="kw-info-order-number">
        </div>

        <div class="kw-info-contact-right">
          <label for="kw-info-message">Your Question</label>
          <textarea name="message" id="kw-info-message" rows="5" required></textarea>
          <input type="submit" value="Submit">
        </div>
      </div>
    </form>
  </article>
</section>
